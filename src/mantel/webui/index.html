<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mantel</title>
<!--
  Mantel chat UI. Served by mantel's local server (same-origin), which proxies
  /api/chat + /api/models to the configured backend (default: local hearth). No
  external/CDN resources — everything (styles, the small Markdown renderer) is
  inline.
-->
<style>
  :root {
    --bg: #17181c; --bg-elev: #1f2024; --bg-input: #26272d; --border: #34353c;
    --text: #ecedf2; --text-dim: #9a9ca6; --accent: #6ea8fe; --accent-dim: #4d7fd1;
    --user-bg: #262a33; --code-bg: #131419; --ok: #57c66a; --err: #e5704b;
    --radius: 12px; --maxw: 760px;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg); color: var(--text);
    font: 15px/1.55 -apple-system, "Segoe UI", Roboto, Ubuntu, "Helvetica Neue", Arial, sans-serif;
    display: flex; flex-direction: column; -webkit-font-smoothing: antialiased;
  }
  header {
    display: flex; align-items: center; gap: 12px; padding: 10px 16px;
    background: var(--bg-elev); border-bottom: 1px solid var(--border); flex: 0 0 auto;
  }
  .brand { display: flex; align-items: center; gap: 8px; font-weight: 650; letter-spacing: .2px; }
  .brand .mark { width: 18px; height: 18px; }
  .spacer { flex: 1 1 auto; }
  select, .toggle, button.btn {
    background: var(--bg-input); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 10px; font-size: 13px; cursor: pointer;
  }
  select:hover, .toggle:hover, button.btn:hover { border-color: #4a4b55; }
  .toggle.on { background: var(--accent); border-color: var(--accent); color: #11131a; font-weight: 600; }
  .status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-dim); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #666; }
  .dot.up { background: var(--ok); } .dot.down { background: var(--err); }
  main { flex: 1 1 auto; overflow-y: auto; }
  #thread { max-width: var(--maxw); margin: 0 auto; padding: 24px 16px 8px; }
  .msg { margin: 0 0 22px; }
  .msg .role { font-size: 11px; text-transform: uppercase; letter-spacing: .6px; color: var(--text-dim); margin-bottom: 6px; }
  .bubble { border-radius: var(--radius); padding: 2px 0; }
  .msg.user .bubble { background: var(--user-bg); padding: 10px 14px; border: 1px solid var(--border); }
  .msg.assistant .bubble { background: transparent; }
  .msg.system .bubble { color: var(--text-dim); font-style: italic; }
  .content > *:first-child { margin-top: 0; } .content > *:last-child { margin-bottom: 0; }
  .content p { margin: 0 0 10px; }
  .content h1,.content h2,.content h3 { margin: 14px 0 8px; line-height: 1.3; }
  .content h1 { font-size: 1.4em; } .content h2 { font-size: 1.2em; } .content h3 { font-size: 1.05em; }
  .content ul,.content ol { margin: 0 0 10px; padding-left: 22px; } .content li { margin: 2px 0; }
  .content blockquote { margin: 0 0 10px; padding: 2px 12px; border-left: 3px solid var(--border); color: var(--text-dim); }
  .content a { color: var(--accent); }
  .content code.inline { background: var(--code-bg); border: 1px solid var(--border); border-radius: 5px; padding: 1px 5px; font-size: .9em; font-family: "SFMono-Regular", Consolas, monospace; }
  .codewrap { position: relative; margin: 0 0 12px; }
  .codewrap pre { background: var(--code-bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; overflow-x: auto; margin: 0; }
  .codewrap code { font-family: "SFMono-Regular", Consolas, monospace; font-size: 13px; line-height: 1.5; }
  .copy { position: absolute; top: 6px; right: 6px; font-size: 11px; padding: 3px 8px; opacity: 0; transition: opacity .12s; }
  .codewrap:hover .copy { opacity: 1; }
  .think { margin: 0 0 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-elev); }
  .think summary { cursor: pointer; padding: 7px 12px; font-size: 12.5px; color: var(--text-dim); list-style: none; user-select: none; }
  .think summary::-webkit-details-marker { display: none; }
  .think[open] summary { border-bottom: 1px solid var(--border); }
  .think .reason { padding: 10px 12px; white-space: pre-wrap; color: var(--text-dim); font-size: 13px; max-height: 300px; overflow-y: auto; }
  .tools { display: flex; flex-direction: column; gap: 4px; margin: 0 0 10px; }
  .tool { font-size: 12.5px; color: var(--text-dim); background: var(--bg-elev); border: 1px solid var(--border); border-radius: 7px; padding: 4px 9px; }
  .tool code { color: var(--accent); background: none; font-size: 12px; }
  .tool .ok { color: var(--ok); } .tool .no { color: var(--err); }
  .tool.note { font-style: italic; }
  .tool .genimg { display: block; max-width: 360px; max-height: 360px; border-radius: 8px; margin-top: 8px; border: 1px solid var(--border); }
  .cursor::after { content: "▍"; color: var(--accent); animation: blink 1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  #empty { max-width: var(--maxw); margin: 16vh auto 0; text-align: center; color: var(--text-dim); padding: 0 16px; }
  #empty .big { font-size: 22px; color: var(--text); margin-bottom: 8px; font-weight: 650; }
  footer { flex: 0 0 auto; padding: 10px 16px 16px; }
  .composer { max-width: var(--maxw); margin: 0 auto; display: flex; gap: 8px; align-items: flex-end;
    background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 8px 8px 14px; position: relative; }
  .composer:focus-within { border-color: var(--accent-dim); }
  #input { flex: 1 1 auto; background: transparent; border: 0; color: var(--text); resize: none;
    font: inherit; line-height: 1.5; max-height: 200px; outline: none; padding: 5px 0; }
  #send { flex: 0 0 auto; width: 36px; height: 36px; border-radius: 9px; border: 0; cursor: pointer;
    background: var(--accent); color: #11131a; font-size: 17px; display: grid; place-items: center; }
  #send:disabled { opacity: .4; cursor: default; }
  #send.stop { background: var(--err); }
  .hint { max-width: var(--maxw); margin: 6px auto 0; font-size: 11px; color: var(--text-dim); text-align: center; }
  /* slash-command palette */
  .palette { position: absolute; left: 0; right: 0; bottom: calc(100% + 8px); z-index: 20;
    background: var(--bg-elev); border: 1px solid var(--border); border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,.45); max-height: 300px; overflow-y: auto; padding: 4px; }
  .palette.hidden { display: none; }
  .pitem { display: flex; align-items: baseline; gap: 10px; padding: 7px 10px; border-radius: 7px; cursor: pointer; }
  .pitem.active { background: var(--user-bg); }
  .pname { color: var(--accent); font-family: "SFMono-Regular", Consolas, monospace; font-size: 13px; white-space: nowrap; }
  .pdesc { color: var(--text-dim); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .phint { padding: 6px 10px 7px; color: var(--text-dim); font-size: 11px; border-top: 1px solid var(--border); margin-top: 2px; }
  /* attachments */
  #attach { flex: 0 0 auto; width: 32px; height: 36px; background: transparent; border: 0; cursor: pointer;
    color: var(--text-dim); font-size: 17px; display: grid; place-items: center; padding: 0; }
  #attach:hover { color: var(--accent); }
  #mic { flex: 0 0 auto; width: 32px; height: 36px; background: transparent; border: 0; cursor: pointer;
    color: var(--text-dim); font-size: 16px; display: grid; place-items: center; padding: 0; }
  #mic:hover { color: var(--accent); }
  #mic.rec { color: var(--err); animation: blink 1s steps(2) infinite; }
  .attachbar { max-width: var(--maxw); margin: 0 auto 8px; display: flex; flex-wrap: wrap; gap: 6px; }
  .attachbar.hidden { display: none; }
  .chip { display: inline-flex; align-items: center; gap: 6px; background: var(--bg-input);
    border: 1px solid var(--border); border-radius: 8px; padding: 3px 4px 3px 7px; font-size: 12px;
    color: var(--text-dim); max-width: 240px; }
  .chip img { width: 26px; height: 26px; object-fit: cover; border-radius: 4px; }
  .chip .nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chip .x { cursor: pointer; color: var(--text-dim); border: 0; background: none; font-size: 15px; line-height: 1; padding: 0 3px; }
  .chip .x:hover { color: var(--err); }
  .composer.drag { border-color: var(--accent); outline: 2px dashed var(--accent-dim); outline-offset: 2px; }
  .msg .att { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .msg .att img { max-width: 240px; max-height: 240px; border-radius: 8px; border: 1px solid var(--border); }
  .msgact { display: flex; gap: 6px; margin-top: 8px; }
  .msgact .speak { font-size: 12px; padding: 2px 9px; opacity: .55; }
  .msgact .speak:hover { opacity: 1; }
  /* tools & settings drawer (clickable config — pairs with the / palette) */
  .scrim { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 40; }
  .scrim.hidden, .drawer.hidden { display: none; }
  .drawer { position: fixed; top: 0; right: 0; bottom: 0; width: 380px; max-width: 92vw; z-index: 50;
    background: var(--bg-elev); border-left: 1px solid var(--border); display: flex; flex-direction: column;
    box-shadow: -14px 0 44px rgba(0,0,0,.45); }
  .drawerHead { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px;
    border-bottom: 1px solid var(--border); font-weight: 650; }
  .drawerBody { overflow-y: auto; padding: 4px 14px 18px; }
  .drawerBody section { margin: 16px 0; }
  .drawerBody h4 { margin: 0 0 8px; font-size: 11px; text-transform: uppercase; letter-spacing: .6px; color: var(--text-dim); }
  .muted { color: var(--text-dim); font-weight: 400; text-transform: none; letter-spacing: 0; }
  .row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 7px 10px;
    border: 1px solid var(--border); border-radius: 8px; margin-bottom: 6px; background: var(--bg-input); }
  .row .lbl { overflow: hidden; min-width: 0; }
  .row .lbl .t { font-size: 13px; }
  .row .lbl .s { font-size: 11px; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sw { flex: 0 0 auto; width: 40px; height: 22px; border-radius: 11px; border: 1px solid var(--border);
    background: var(--bg); position: relative; cursor: pointer; transition: background .15s; }
  .sw::after { content: ""; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 50%;
    background: var(--text-dim); transition: transform .15s, background .15s; }
  .sw.on { background: var(--accent); border-color: var(--accent); }
  .sw.on::after { transform: translateX(18px); background: #11131a; }
  .pill { font-size: 12px; padding: 3px 11px; border-radius: 7px; border: 1px solid var(--border);
    background: var(--bg-input); color: var(--text-dim); cursor: pointer; margin: 0 6px 6px 0; }
  .pill.on { background: var(--accent); border-color: var(--accent); color: #11131a; }
  .cfgempty { color: var(--text-dim); font-size: 12px; padding: 4px 2px; }
  .drawer.left { left: 0; right: auto; border-left: 0; border-right: 1px solid var(--border);
    box-shadow: 14px 0 44px rgba(0,0,0,.45); }
  .row.active { border-color: var(--accent-dim); }
  .row .lbl { cursor: pointer; }
</style>
</head>
<body>
  <header>
    <span class="brand">
      <svg class="mark" viewBox="0 0 24 24" aria-hidden="true"><rect x="2" y="5" width="20" height="3" rx="1.5" fill="#6ea8fe"/><path d="M5 9v9a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V9" fill="none" stroke="#6ea8fe" stroke-width="2"/></svg>
      Mantel
    </span>
    <button class="btn" id="chatsbtn" title="Conversations">Chats</button>
    <span class="spacer"></span>
    <select id="model" title="Model"></select>
    <button class="toggle on" id="think" title="Deep-think (hearth): reason before answering. Off = fast lane.">💭 Think</button>
    <span class="status"><span class="dot" id="dot"></span><span id="statusText">…</span></span>
    <button class="btn" id="cfgbtn" title="Tools &amp; settings">⚙</button>
    <button class="btn" id="newchat" title="New conversation">New</button>
  </header>
  <main>
    <div id="thread"></div>
    <div id="empty"><div class="big">Mantel</div><div id="emptySub">Universal chat — local-first, any backend.</div></div>
  </main>
  <footer>
    <div id="attachBar" class="attachbar hidden"></div>
    <div class="composer">
      <div id="palette" class="palette hidden"></div>
      <button id="attach" title="Attach image or document">📎</button>
      <input type="file" id="file" multiple hidden
             accept="image/*,.pdf,.docx,.txt,.md,.markdown,.csv,.tsv,.json,.yaml,.yml,.log,.py,.js,.ts,.tsx,.html,.css,.sh,.c,.cpp,.h,.rs,.go,.java,.rb,.toml,.ini,.xml,.sql">
      <button id="mic" title="Voice input (speak → text)">🎤</button>
      <textarea id="input" rows="1" placeholder="Message…   ( type / for commands )" autofocus></textarea>
      <button id="send" title="Send">↑</button>
    </div>
    <div class="hint" id="hint">Enter to send · Shift+Enter for a new line · 📎 or drag/paste to attach</div>
  </footer>
  <div id="chatsScrim" class="scrim hidden"></div>
  <aside id="chatsPanel" class="drawer left hidden" aria-label="Conversations">
    <div class="drawerHead"><span>Conversations</span><button class="btn" id="chatsNew" title="Start a new conversation">+ New</button></div>
    <div class="drawerBody" id="chatsList"></div>
  </aside>
  <div id="cfgScrim" class="scrim hidden"></div>
  <aside id="cfgPanel" class="drawer hidden" aria-label="Tools and settings">
    <div class="drawerHead"><span>⚙ Tools &amp; Settings</span><button class="btn" id="cfgClose" title="Close">✕</button></div>
    <div class="drawerBody">
      <section><h4>Backend</h4><div id="cfgProviders"></div><div id="cfgStatus" class="cfgempty"></div></section>
      <section><h4>MCP servers</h4><div id="cfgServers"></div></section>
      <section><h4>Tools <span id="cfgToolCount" class="muted"></span></h4><div id="cfgTools"></div></section>
    </div>
  </aside>
<script>
"use strict";
const $ = (id) => document.getElementById(id);
let history = [];
let model = null;
let deepThink = true;
let controller = null;
let streaming = false;
let attachments = [];   // pending: {kind:"image", url, name} | {kind:"doc", name, text, chars}
let currentConvId = null;   // id of the conversation being persisted (null = unsaved/new)

// ── tiny Markdown renderer (no deps) ───────────────────────────────────────
function escapeHtml(s){ return s.replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }
function inlineMd(s){
  s = s.replace(/`([^`]+)`/g, (_, c) => `<code class="inline">${c}</code>`);
  s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, "$1<em>$2</em>");
  s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  s = s.replace(/(^|[\s(])(https?:\/\/[^\s<)]+)/g, '$1<a href="$2" target="_blank" rel="noopener">$2</a>');
  return s;
}
function renderMarkdown(src){
  const out = [];
  for (const part of src.split(/(```[\s\S]*?```)/g)) {
    if (part.startsWith("```")) {
      const m = part.match(/^```[^\n]*\n?([\s\S]*?)```$/);
      const code = escapeHtml(m ? m[1].replace(/\n$/, "") : part.slice(3));
      out.push(`<div class="codewrap"><button class="btn copy">copy</button><pre><code>${code}</code></pre></div>`);
      continue;
    }
    let para = [], list = null;
    const flushPara = () => { if (para.length) { out.push(`<p>${inlineMd(escapeHtml(para.join(" ")))}</p>`); para = []; } };
    const flushList = () => { if (list) { out.push(`<${list.tag}>${list.items.join("")}</${list.tag}>`); list = null; } };
    for (const raw of part.split("\n")) {
      const line = raw.replace(/\s+$/, ""); let m;
      if (!line.trim()) { flushPara(); flushList(); continue; }
      if ((m = line.match(/^(#{1,3})\s+(.*)$/))) { flushPara(); flushList(); const h = m[1].length; out.push(`<h${h}>${inlineMd(escapeHtml(m[2]))}</h${h}>`); continue; }
      if ((m = line.match(/^>\s?(.*)$/))) { flushPara(); flushList(); out.push(`<blockquote>${inlineMd(escapeHtml(m[1]))}</blockquote>`); continue; }
      if ((m = line.match(/^\s*[-*+]\s+(.*)$/))) { flushPara(); if (!list || list.tag !== "ul") { flushList(); list = { tag: "ul", items: [] }; } list.items.push(`<li>${inlineMd(escapeHtml(m[1]))}</li>`); continue; }
      if ((m = line.match(/^\s*\d+[.)]\s+(.*)$/))) { flushPara(); if (!list || list.tag !== "ol") { flushList(); list = { tag: "ol", items: [] }; } list.items.push(`<li>${inlineMd(escapeHtml(m[1]))}</li>`); continue; }
      flushList(); para.push(line.trim());
    }
    flushPara(); flushList();
  }
  return out.join("");
}

// ── rendering ──────────────────────────────────────────────────────────────
function setEmpty(show){ $("empty").style.display = show ? "" : "none"; }
function addBubble(role){
  setEmpty(false);
  const wrap = document.createElement("div");
  wrap.className = "msg " + role;
  wrap.innerHTML = `<div class="role">${role === "assistant" ? "Assistant" : role}</div>`
    + (role === "assistant"
       ? `<div class="bubble"><details class="think" style="display:none"><summary>💭 Thinking…</summary><div class="reason"></div></details><div class="content"></div></div>`
       : `<div class="bubble"><div class="content"></div></div>`);
  $("thread").appendChild(wrap);
  return wrap;
}
function setContent(wrap, text, isMd, cursor){ const el = wrap.querySelector(".content"); el.innerHTML = isMd ? renderMarkdown(text) : escapeHtml(text); el.classList.toggle("cursor", !!cursor); }
function setReasoning(wrap, text){ const det = wrap.querySelector(".think"); if (!text) { det.style.display = "none"; return; } det.style.display = ""; det.querySelector(".reason").textContent = text; }
function renderTool(wrap, ev){
  const bubble = wrap.querySelector(".bubble");
  let tools = bubble.querySelector(".tools");
  if (!tools) { tools = document.createElement("div"); tools.className = "tools"; bubble.insertBefore(tools, bubble.querySelector(".content")); }
  if (ev.phase === "call") {
    const row = document.createElement("div"); row.className = "tool"; row.dataset.tid = ev.id || "";
    row.innerHTML = `🔧 <code>${escapeHtml(ev.name || "")}</code><span class="tr"> · running…</span>`;
    tools.appendChild(row);
  } else if (ev.phase === "result") {
    const row = [...tools.querySelectorAll(".tool[data-tid]")].reverse().find(r => r.dataset.tid === (ev.id || "")) || tools.lastElementChild;
    const icon = ev.denied ? "⛔" : (ev.ok ? "✓" : "✗");
    const content = String(ev.content || "");
    const img = content.match(/data:image\/[a-zA-Z0-9.+-]+;base64,[A-Za-z0-9+/=]+/);
    if (row && row.querySelector(".tr")) {
      if (img) {                                   // generated image → render inline
        row.querySelector(".tr").innerHTML = ` <span class="ok">${icon}</span> image`;
        const el = document.createElement("img"); el.className = "genimg"; el.src = img[0]; row.appendChild(el);
      } else {
        const snip = content.replace(/\s+/g, " ").slice(0, 140);
        row.querySelector(".tr").innerHTML = ` <span class="${ev.ok ? "ok" : "no"}">${icon}</span> ${escapeHtml(snip)}`;
      }
    }
  } else if (ev.phase === "note") {
    const row = document.createElement("div"); row.className = "tool note"; row.textContent = ev.content || ""; tools.appendChild(row);
  }
}
function scrollDown(){ const m = document.querySelector("main"); m.scrollTop = m.scrollHeight; }
document.addEventListener("click", (e) => {
  if (e.target.classList.contains("copy")) {
    const code = e.target.parentElement.querySelector("code");
    navigator.clipboard?.writeText(code.innerText).then(() => { e.target.textContent = "copied"; setTimeout(() => e.target.textContent = "copy", 1200); });
  }
});

// ── backend plumbing (mantel's /api/* proxy) ──────────────────────────────────
async function loadConfig(){
  try { const c = await (await fetch("/api/config")).json();
    $("hint").textContent = `Enter ⏎ to send · /help for commands · backend: ${c.provider} (${c.model})`;
    $("emptySub").textContent = `Talking to ${c.provider} — local-first, any backend.`;
  } catch {}
}
async function refreshStatus(){
  try {
    const r = await fetch("/api/models", { cache: "no-store" });
    const data = (await r.json()).data || [];
    const up = r.ok && data.length > 0;
    $("dot").className = "dot " + (up ? "up" : "down");
    $("statusText").textContent = up ? "connected" : "no backend";
    populateModels(data);
  } catch { $("dot").className = "dot down"; $("statusText").textContent = "offline"; }
}
function populateModels(data){
  const sel = $("model"); if (sel.dataset.filled === "1" && data.length === 0) return;
  const roles = data.filter(m => m.owned_by === "hearth-role").map(m => m.id);
  const concrete = data.filter(m => m.owned_by !== "hearth-role").map(m => m.id);
  sel.innerHTML = "";
  const add = (id, label) => { const o = document.createElement("option"); o.value = id; o.textContent = label || id; sel.appendChild(o); };
  roles.forEach(r => add(r, r + "  ·role"));
  if (roles.length && concrete.length) { const o = document.createElement("option"); o.disabled = true; o.textContent = "──────"; sel.appendChild(o); }
  concrete.forEach(c => add(c));
  if (data.length) sel.dataset.filled = "1";
  if (model && [...sel.options].some(o => o.value === model)) sel.value = model;
  else if (sel.options.length) model = sel.value = sel.options[0].value;
}

function setSending(on){ streaming = on; const b = $("send"); b.classList.toggle("stop", on); b.textContent = on ? "■" : "↑"; b.title = on ? "Stop" : "Send"; }

const SLASH_HELP = [
  "<b>Commands</b> — manage MCP + the backend without leaving chat:",
  "· <code>/tools</code> — list available tools",
  "· <code>/servers</code> — list configured MCP servers",
  "· <code>/enable &lt;server&gt;</code> · <code>/disable &lt;server&gt;</code> — toggle a server (live)",
  "· <code>/provider &lt;name&gt;</code> — switch backend · <code>/model &lt;name&gt;</code> — switch model",
  "· <code>/status</code> — backend, model, tool count · <code>/clear</code> — new chat · <code>/help</code>",
].join("<br>");

async function handleSlash(text){
  _argCache = { cmd: null, items: [] };   // a command may change servers/provider — refetch on next palette open
  const esc = escapeHtml;
  const parts = text.slice(1).trim().split(/\s+/);
  const cmd = (parts.shift() || "").toLowerCase();
  const arg = parts.join(" ");
  const sys = (html) => { addBubble("system").querySelector(".content").innerHTML = html; scrollDown(); };
  try {
    if (cmd === "" || cmd === "help") return sys(SLASH_HELP);
    if (cmd === "clear" || cmd === "new") { history = []; currentConvId = null; $("thread").innerHTML = ""; setEmpty(true); return; }
    if (cmd === "tools") {
      const j = await (await fetch("/api/tools")).json();
      if (!(j.tools || []).length) return sys("No tools yet. Enable a server: <code>/enable &lt;name&gt;</code> (see <code>/servers</code>).");
      return sys("<b>Tools</b><br>" + j.tools.map(t => `· <code>${esc(t.name)}</code> — ${esc((t.description || "").slice(0, 80))}`).join("<br>"));
    }
    if (cmd === "servers" || cmd === "mcp") {
      const j = await (await fetch("/api/servers")).json();
      if (!(j.servers || []).length) return sys("No MCP servers configured. Add them via the config file, then <code>/enable</code>.");
      return sys("<b>MCP servers</b><br>" + j.servers.map(s => `${s.enabled ? "🟢" : "⚪"} <code>${esc(s.name)}</code> — ${esc(s.command)} ${esc((s.args || []).join(" "))}`).join("<br>"));
    }
    if (cmd === "enable" || cmd === "disable") {
      if (!arg) return sys(`Usage: <code>/${cmd} &lt;server&gt;</code>`);
      const r = await fetch(`/api/mcp/${encodeURIComponent(arg)}/${cmd}`, { method: "POST" });
      const j = await r.json();
      if (!r.ok) return sys(`⚠ ${esc(j.error || "failed")}`);
      refreshStatus();
      const errs = Object.keys(j.errors || {}).length ? `<br>⚠ ${esc(JSON.stringify(j.errors))}` : "";
      return sys(`${cmd === "enable" ? "🟢" : "⚪"} <code>${esc(arg)}</code> ${cmd}d — ${j.tools} tool(s) available now.${errs}`);
    }
    if (cmd === "provider") {
      if (!arg) return sys("Usage: <code>/provider &lt;name&gt;</code>");
      const r = await fetch(`/api/provider/${encodeURIComponent(arg)}`, { method: "POST" });
      const j = await r.json();
      if (r.ok) { loadConfig(); refreshStatus(); return sys(`Backend → <code>${esc(arg)}</code> (${esc(j.backend)}).`); }
      return sys(`⚠ ${esc(j.error || "failed")}`);
    }
    if (cmd === "model") {
      if (!arg) return sys("Usage: <code>/model &lt;name&gt;</code>");
      model = arg; const sel = $("model"); if ([...sel.options].some(o => o.value === arg)) sel.value = arg;
      return sys(`Model → <code>${esc(arg)}</code>.`);
    }
    if (cmd === "status") {
      const c = await (await fetch("/api/config")).json();
      return sys(`backend <code>${esc(c.provider)}</code> (${esc(c.backend)}) · model <code>${esc(c.model)}</code> · ${c.tools} tool(s)`);
    }
    sys(`Unknown command <code>/${esc(cmd)}</code> — try <code>/help</code>.`);
  } catch (e) { sys(`⚠ ${esc(String(e.message || e))}`); }
}

// ── slash-command palette (type "/" → a filtered menu; completes commands AND
//    their arguments — so the actual servers/providers/models are listed, no
//    blind-guessing names) ──────────────────────────────────────────────────
const COMMANDS = [
  { name: "tools",    desc: "list available tools" },
  { name: "servers",  desc: "list configured MCP servers" },
  { name: "enable",   desc: "turn an MCP server on (live)",  arg: "server" },
  { name: "disable",  desc: "turn an MCP server off (live)", arg: "server" },
  { name: "provider", desc: "switch backend",                arg: "provider" },
  { name: "model",    desc: "switch model",                  arg: "model" },
  { name: "status",   desc: "backend, model, tool count" },
  { name: "clear",    desc: "start a new conversation" },
  { name: "help",     desc: "show all commands" },
];
let palItems = [], palActive = 0, palMode = null;       // palMode: "cmd" | "arg"
let palSeq = 0;                                         // bumped on every keystroke + dismiss → invalidates in-flight fetches
let _argCache = { cmd: null, items: [] };               // arg values, fetched once per command
const palEl = () => $("palette");
const palOpen = () => !palEl().classList.contains("hidden");

async function _argValues(cmd){
  try {
    if (cmd === "enable" || cmd === "disable") {
      const j = await (await fetch("/api/servers")).json();
      return (j.servers || []).map(s => ({ value: s.name, desc: s.enabled ? "🟢 enabled" : "⚪ disabled" }));
    }
    if (cmd === "provider") {
      const j = await (await fetch("/api/config")).json();
      return (j.providers || []).map(p => ({ value: p, desc: p === j.provider ? "active" : "" }));
    }
    if (cmd === "model") {
      const j = await (await fetch("/api/models", { cache: "no-store" })).json();
      return (j.data || []).map(m => ({ value: m.id, desc: m.owned_by === "hearth-role" ? "role" : (m.owned_by || "") }));
    }
  } catch {}
  return [];
}

async function updatePalette(){
  const seq = ++palSeq;                                 // this call's ticket; a dismiss or newer keystroke supersedes it
  const text = $("input").value;
  if (text[0] !== "/") return hidePalette();
  const m = text.match(/^\/(\S*)(\s+)?(.*)$/);          // /cmd  ⟨space⟩  arg
  const cmd = (m[1] || "").toLowerCase(), spaced = !!m[2], argText = m[3] || "";
  if (!spaced) {                                        // still typing the command name
    palMode = "cmd";
    return showPalette(COMMANDS.filter(c => c.name.startsWith(cmd))
      .map(c => ({ value: c.name, label: "/" + c.name, desc: c.desc, arg: c.arg })));
  }
  const c = COMMANDS.find(x => x.name === cmd);         // a known command + a space → complete its arg
  if (!c || !c.arg) return hidePalette();
  if (_argCache.cmd !== cmd) {                          // fetch the real values once, then filter locally
    const items = await _argValues(cmd);
    if (palSeq !== seq) return;                         // dismissed (Esc) or superseded while awaiting → drop this result
    _argCache = { cmd, items };
  }
  palMode = "arg";
  const hit = _argCache.items.filter(it => it.value.toLowerCase().includes(argText.toLowerCase()));
  showPalette((hit.length ? hit : _argCache.items).map(it => ({ value: it.value, label: it.value, desc: it.desc })),
              _argCache.items.length ? "" : `no ${c.arg}s available`);
}

function showPalette(items, footHtml){
  palItems = items; palActive = 0;
  if (!items.length && !footHtml) return hidePalette();
  palEl().innerHTML = items.map((it, i) =>
    `<div class="pitem${i === 0 ? " active" : ""}" data-i="${i}">`
    + `<span class="pname">${escapeHtml(it.label || it.value)}</span>`
    + `<span class="pdesc">${escapeHtml(it.desc || "")}</span></div>`).join("")
    + (footHtml ? `<div class="phint">${escapeHtml(footHtml)}</div>` : "");
  palEl().classList.remove("hidden");
}
function hidePalette(){ palSeq++; palItems = []; palMode = null; palEl().classList.add("hidden"); }
function renderActive(){
  [...palEl().querySelectorAll(".pitem")].forEach((el, i) => {
    const on = i === palActive; el.classList.toggle("active", on); if (on) el.scrollIntoView({ block: "nearest" });
  });
}
function acceptPalette(){
  const it = palItems[palActive]; if (!it) return;
  if (palMode === "cmd") {
    const c = COMMANDS.find(x => x.name === it.value);
    if (c && c.arg) { $("input").value = "/" + it.value + " "; autogrow(); $("input").focus(); updatePalette(); return; }
    $("input").value = "/" + it.value; hidePalette(); send(); return;          // no-arg → run it now
  }
  const cmd = ($("input").value.match(/^\/(\S+)/) || [, ""])[1];               // arg chosen → run it now
  $("input").value = "/" + cmd + " " + it.value; hidePalette(); send();
}

palEl().addEventListener("mousedown", (e) => {                                 // click a row (mousedown keeps input focus)
  const row = e.target.closest(".pitem"); if (!row) return;
  e.preventDefault(); palActive = +row.dataset.i; acceptPalette();
});

// ── attachments (images → inline vision parts; documents → extracted text) ────
function renderAttachBar(){
  const bar = $("attachBar");
  if (!attachments.length) { bar.classList.add("hidden"); bar.innerHTML = ""; return; }
  bar.classList.remove("hidden");
  bar.innerHTML = attachments.map((a, i) =>
    `<span class="chip">${a.kind === "image" ? `<img src="${a.url}" alt="">` : "📄"}`
    + `<span class="nm">${escapeHtml(a.name)}${a.kind === "doc" ? ` · ${a.chars} chars` : ""}</span>`
    + `<button class="x" data-i="${i}" title="Remove">×</button></span>`).join("");
}
$("attachBar").addEventListener("click", (e) => {
  const b = e.target.closest(".x"); if (!b) return;
  attachments.splice(+b.dataset.i, 1); renderAttachBar();
});
function _readDataURL(file){
  return new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsDataURL(file); });
}
function sysMsg(html){ addBubble("system").querySelector(".content").innerHTML = html; scrollDown(); }
async function addFiles(files){
  for (const file of files) {
    if (!file) continue;
    if ((file.type || "").startsWith("image/")) {
      try { attachments.push({ kind: "image", url: await _readDataURL(file), name: file.name || "image" }); }
      catch { sysMsg(`⚠ couldn't read ${escapeHtml(file.name || "image")}`); }
    } else {
      try {
        const fd = new FormData(); fd.append("file", file, file.name);
        const r = await fetch("/api/extract", { method: "POST", body: fd });
        const j = await r.json().catch(() => ({}));
        if (!r.ok) { sysMsg(`⚠ ${escapeHtml(j.error || "couldn't extract " + (file.name || "file"))}`); continue; }
        attachments.push({ kind: "doc", name: j.name || file.name, text: j.text || "", chars: j.chars || 0 });
      } catch (e) { sysMsg(`⚠ ${escapeHtml(String(e.message || e))}`); }
    }
  }
  renderAttachBar(); scrollDown(); $("input").focus();
}
$("attach").addEventListener("click", () => $("file").click());
$("file").addEventListener("change", (e) => { addFiles([...e.target.files]); e.target.value = ""; });
(() => {
  const comp = document.querySelector(".composer");
  ["dragenter", "dragover"].forEach(ev => comp.addEventListener(ev, (e) => { e.preventDefault(); comp.classList.add("drag"); }));
  comp.addEventListener("dragleave", (e) => { if (e.target === comp) comp.classList.remove("drag"); });
  comp.addEventListener("drop", (e) => { e.preventDefault(); comp.classList.remove("drag"); if (e.dataTransfer?.files?.length) addFiles([...e.dataTransfer.files]); });
})();
$("input").addEventListener("paste", (e) => {
  const imgs = [...(e.clipboardData?.items || [])].filter(it => it.kind === "file" && (it.type || "").startsWith("image/"));
  if (imgs.length) { e.preventDefault(); addFiles(imgs.map(it => it.getAsFile())); }
});
function renderUserBubble(wrap, text, atts){
  wrap.querySelector(".content").textContent = text || "";
  if (!atts || !atts.length) return;
  const box = document.createElement("div"); box.className = "att";
  for (const d of atts.filter(a => a.kind === "doc")) {
    const s = document.createElement("span"); s.className = "chip";
    s.innerHTML = `📄 <span class="nm">${escapeHtml(d.name)}</span>`; box.appendChild(s);
  }
  for (const im of atts.filter(a => a.kind === "image")) {
    const img = document.createElement("img"); img.src = im.url; img.alt = im.name; box.appendChild(img);
  }
  wrap.querySelector(".bubble").appendChild(box);
}

// ── read-aloud (TTS via /api/speak → backend Piper/OpenAI) ────────────────────
let ttsAudio = null;
function addSpeakBtn(wrap, text){
  const bubble = wrap.querySelector(".bubble"); if (!bubble || bubble.querySelector(".msgact")) return;
  const bar = document.createElement("div"); bar.className = "msgact";
  const b = document.createElement("button"); b.className = "btn speak"; b.textContent = "🔊"; b.title = "Read aloud";
  b.addEventListener("click", () => speak(b, text));
  bar.appendChild(b); bubble.appendChild(bar);
}
async function speak(btn, text){
  if (ttsAudio) { const wasThis = ttsAudio._btn === btn; ttsAudio.pause(); ttsAudio = null; if (wasThis) { btn.textContent = "🔊"; return; } }
  btn.textContent = "…";
  try {
    const r = await fetch("/api/speak", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ text }) });
    if (!r.ok) { let m = "TTS unavailable"; try { m = (await r.json()).error || m; } catch {} btn.textContent = "🔇"; btn.title = m; setTimeout(() => { btn.textContent = "🔊"; btn.title = "Read aloud"; }, 2500); return; }
    const url = URL.createObjectURL(await r.blob());
    const a = new Audio(url); a._btn = btn; ttsAudio = a;
    btn.textContent = "⏹";
    const done = () => { if (ttsAudio === a) ttsAudio = null; btn.textContent = "🔊"; URL.revokeObjectURL(url); };
    a.onended = done; a.onerror = done;
    a.play().catch(done);
  } catch { btn.textContent = "🔊"; }
}

// ── voice input (mic → /api/transcribe → composer) ────────────────────────────
let mediaRec = null, recChunks = [], recStream = null;
async function toggleMic(){
  const btn = $("mic");
  if (mediaRec && mediaRec.state === "recording") { mediaRec.stop(); return; }
  if (!navigator.mediaDevices?.getUserMedia || typeof MediaRecorder === "undefined") {
    sysMsg("⚠ microphone/recording not available in this browser"); return;
  }
  try { recStream = await navigator.mediaDevices.getUserMedia({ audio: true }); }
  catch (e) { sysMsg(`⚠ mic permission denied: ${escapeHtml(String(e.message || e))}`); return; }
  recChunks = [];
  try { mediaRec = new MediaRecorder(recStream); }
  catch (e) {
    recStream.getTracks().forEach(t => t.stop()); recStream = null;   // don't leave the mic live
    sysMsg(`⚠ recording unsupported here: ${escapeHtml(String(e.message || e))}`); return;
  }
  mediaRec.ondataavailable = (e) => { if (e.data && e.data.size) recChunks.push(e.data); };
  mediaRec.onstop = async () => {
    recStream.getTracks().forEach(t => t.stop()); recStream = null;
    btn.classList.remove("rec"); btn.textContent = "🎤"; btn.title = "Voice input (speak → text)";
    const blob = new Blob(recChunks, { type: (mediaRec && mediaRec.mimeType) || "audio/webm" });
    if (!blob.size) return;
    btn.textContent = "…";
    try {
      const fd = new FormData(); fd.append("file", blob, "speech.webm");
      const r = await fetch("/api/transcribe", { method: "POST", body: fd });
      const j = await r.json().catch(() => ({}));
      btn.textContent = "🎤";
      if (!r.ok) { sysMsg(`⚠ ${escapeHtml(j.error || "transcription failed")}`); return; }
      const t = (j.text || "").trim();
      if (t) { const inp = $("input"); inp.value = (inp.value ? inp.value.trim() + " " : "") + t; autogrow(); inp.focus(); }
    } catch (e) { btn.textContent = "🎤"; sysMsg(`⚠ ${escapeHtml(String(e.message || e))}`); }
  };
  mediaRec.start();
  btn.classList.add("rec"); btn.textContent = "⏺"; btn.title = "Stop & transcribe";
}
$("mic").addEventListener("click", toggleMic);

// A leading "/" is a COMMAND only when it's actually one — an arg-command
// (/model …, /enable …) or a no-arg command typed alone (/help, /clear). Anything
// else ("/usr/local/bin…", "/think about X", a pasted path) is normal chat, so the
// composer never hijacks a message that merely starts with a slash.
const _ARG_CMDS = new Set(["enable", "disable", "provider", "model"]);
function looksLikeCommand(text){
  const m = text.match(/^\/(\w[\w-]*)(?:\s+(.*))?$/);
  if (!m) return false;
  const cmd = m[1].toLowerCase(), rest = (m[2] || "").trim();
  const known = COMMANDS.some(c => c.name === cmd) || cmd === "new" || cmd === "mcp";
  if (!known) return false;                      // unknown /word → chat
  return _ARG_CMDS.has(cmd) ? true : rest === ""; // no-arg cmd only when nothing trails it
}

// ── conversation persistence (server-side; survives reloads & windows) ────────
function _uuid(){ return crypto.randomUUID ? crypto.randomUUID() : "c-" + Date.now() + "-" + Math.random().toString(16).slice(2); }
function chatTitle(hist){
  const first = hist.find(m => m.role === "user");
  let t = first ? (typeof first.content === "string" ? first.content
                   : (Array.isArray(first.content)
                      ? ((first.content.find(p => p && p.type === "text") || {}).text || "Image")
                      : "Chat")) : "";
  t = (t || "New chat").replace(/\s+/g, " ").trim();
  return t.length > 60 ? t.slice(0, 60) + "…" : t;
}
async function saveChat(){
  if (!currentConvId || !history.length) return;
  try { await fetch(`/api/chats/${currentConvId}`, { method: "PUT", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title: chatTitle(history), messages: history }) }); } catch {}
}
function renderSavedUser(content){
  let text = "", atts = [];
  if (typeof content === "string") text = content;
  else if (Array.isArray(content)) for (const p of content) {
    if (!p || typeof p !== "object") continue;
    if (p.type === "text") text += (text ? "\n" : "") + (p.text || "");
    else if (p.type === "image_url" && p.image_url) atts.push({ kind: "image", url: p.image_url.url, name: "image" });
  }
  renderUserBubble(addBubble("user"), text, atts);
}
function renderHistory(){
  $("thread").innerHTML = "";
  for (const m of history) {
    if (m.role === "user") renderSavedUser(m.content);
    else if (m.role === "assistant") {
      const w = addBubble("assistant");
      const txt = typeof m.content === "string" ? m.content : "";
      setContent(w, txt, true, false);
      if (txt) addSpeakBtn(w, txt);
    }
  }
  setEmpty(history.length === 0);
  scrollDown();
}

async function send(){
  if (streaming) { controller?.abort(); return; }
  hidePalette();
  const text = $("input").value.trim(); if (!text && !attachments.length) return;
  if (!attachments.length && looksLikeCommand(text)) {   // a real command — not arbitrary text starting with "/"
    $("input").value = ""; autogrow();
    addBubble("user").querySelector(".content").textContent = text; scrollDown();
    handleSlash(text);
    return;
  }
  $("input").value = ""; autogrow();
  const atts = attachments; attachments = []; renderAttachBar();
  const docPrefix = atts.filter(a => a.kind === "doc")
                        .map(a => `[Attached document: ${a.name}]\n\n${a.text}`).join("\n\n");
  const images = atts.filter(a => a.kind === "image");
  let userContent;
  if (images.length) {                  // multimodal → OpenAI content-parts array (vision model)
    const parts = [];
    if (docPrefix) parts.push({ type: "text", text: docPrefix });
    if (text) parts.push({ type: "text", text });
    for (const im of images) parts.push({ type: "image_url", image_url: { url: im.url } });
    userContent = parts;
  } else if (docPrefix) {               // doc(s) only → plain string (any text model + hearth's native path)
    userContent = text ? `${docPrefix}\n\n${text}` : docPrefix;
  } else {
    userContent = text;
  }
  if (!currentConvId) currentConvId = _uuid();
  const convId0 = currentConvId;   // pin this turn to its conversation
  history.push({ role: "user", content: userContent });
  renderUserBubble(addBubble("user"), text, atts); scrollDown();
  const wrap = addBubble("assistant");
  let answer = "", reasoning = "", gotContent = false, err = null;
  setContent(wrap, "", false, true); scrollDown();
  // Deep-think off → hearth's `think:false` fast lane (a no-op on non-hearth
  // backends in M0; M1 makes this provider-aware). On → default reasoning.
  const req = deepThink ? { model, messages: history, stream: true }
                        : { model, messages: history, stream: true, think: false };
  setSending(true); controller = new AbortController();
  let raf = 0;
  const paint = () => { raf = 0; setReasoning(wrap, gotContent ? "" : reasoning); setContent(wrap, answer, true, true); if (reasoning && !gotContent) wrap.querySelector(".think").open = true; scrollDown(); };
  const schedule = () => { if (!raf) raf = requestAnimationFrame(paint); };
  try {
    const r = await fetch("/api/chat", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(req), signal: controller.signal });
    if (!r.ok || !r.body) { err = `HTTP ${r.status}: ${(await r.text()).slice(0, 300)}`; }
    else {
      const handleLine = (line) => {
        if (!line.startsWith("data:")) return false;
        const payload = line.slice(5).trim();
        if (payload === "[DONE]") return true;
        let obj; try { obj = JSON.parse(payload); } catch { return false; }
        if (obj.error) { err = (obj.error && obj.error.message) || String(obj.error); return true; }
        if (obj.mantel_tool) { renderTool(wrap, obj.mantel_tool); scrollDown(); return false; }
        const d = (obj.choices && obj.choices[0] && obj.choices[0].delta) || {};
        const reason = d.reasoning || d.reasoning_content || "";
        if (reason && !gotContent) { reasoning += reason; schedule(); }
        if (d.content) { gotContent = true; answer += d.content; schedule(); }
        return false;
      };
      const reader = r.body.getReader(); const dec = new TextDecoder(); let buf = "", stop = false;
      while (!stop) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream: true });
        let nl;
        while ((nl = buf.indexOf("\n")) >= 0) { const line = buf.slice(0, nl); buf = buf.slice(nl + 1); if (handleLine(line)) { stop = true; break; } }
      }
      buf += dec.decode();
      if (!stop && buf.trim()) handleLine(buf.trim());
    }
  } catch (e) { if (e.name !== "AbortError") err = String(e.message || e); }
  if (raf) cancelAnimationFrame(raf);
  // If the user switched/cleared conversations mid-stream, this turn's history and
  // DOM no longer belong here — bail without mutating or saving the wrong chat.
  if (currentConvId !== convId0) { setSending(false); controller = null; return; }
  if (gotContent) wrap.querySelector(".think").open = false;
  setReasoning(wrap, gotContent ? "" : reasoning);
  if (err) {
    history.pop();
    setContent(wrap, "", false, false);
    wrap.querySelector(".content").innerHTML = `<span style="color:var(--err)">⚠ ${escapeHtml(err)}</span>`;
    setSending(false); controller = null; return;
  }
  setContent(wrap, answer, true, false);
  if (answer) { history.push({ role: "assistant", content: answer }); addSpeakBtn(wrap, answer); saveChat(); }
  else { history.pop(); wrap.remove(); }
  setSending(false); controller = null; $("input").focus();
}

function autogrow(){ const t = $("input"); t.style.height = "auto"; t.style.height = Math.min(t.scrollHeight, 200) + "px"; }
$("input").addEventListener("input", () => { autogrow(); updatePalette(); });
$("input").addEventListener("blur", () => setTimeout(hidePalette, 120));   // let a row click land before hiding
$("input").addEventListener("keydown", (e) => {
  if (palOpen()) {
    if (e.key === "ArrowDown") { e.preventDefault(); palActive = Math.min(palActive + 1, palItems.length - 1); renderActive(); return; }
    if (e.key === "ArrowUp")   { e.preventDefault(); palActive = Math.max(palActive - 1, 0); renderActive(); return; }
    if (e.key === "Tab" || (e.key === "Enter" && !e.shiftKey)) { e.preventDefault(); acceptPalette(); return; }
    if (e.key === "Escape")    { e.preventDefault(); e.stopPropagation(); hidePalette(); return; }
  }
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});
$("send").addEventListener("click", send);
$("model").addEventListener("change", (e) => { model = e.target.value; });
$("think").addEventListener("click", () => { deepThink = !deepThink; $("think").classList.toggle("on", deepThink); $("think").textContent = deepThink ? "💭 Think" : "⚡ Fast"; });
$("newchat").addEventListener("click", () => { if (streaming) controller?.abort(); history = []; currentConvId = null; $("thread").innerHTML = ""; setEmpty(true); $("input").focus(); });

// ── tools & settings drawer (clickable config — same actions as the / palette) ─
function openCfg(){ $("cfgScrim").classList.remove("hidden"); $("cfgPanel").classList.remove("hidden"); refreshCfg(); }
function closeCfg(){ $("cfgScrim").classList.add("hidden"); $("cfgPanel").classList.add("hidden"); }
$("cfgbtn").addEventListener("click", openCfg);
$("cfgClose").addEventListener("click", closeCfg);
$("cfgScrim").addEventListener("click", closeCfg);
document.addEventListener("keydown", (e) => {
  if (e.key !== "Escape" || palOpen()) return;
  if (!$("cfgPanel").classList.contains("hidden")) closeCfg();
  else if (!$("chatsPanel").classList.contains("hidden")) closeChats();
});

// ── conversations drawer (list / resume / delete persisted chats) ─────────────
function openChats(){ $("chatsScrim").classList.remove("hidden"); $("chatsPanel").classList.remove("hidden"); refreshChats(); }
function closeChats(){ $("chatsScrim").classList.add("hidden"); $("chatsPanel").classList.add("hidden"); }
function relTime(ts){
  if (!ts) return "";
  const s = Date.now() / 1000 - ts;
  if (s < 60) return "just now";
  if (s < 3600) return Math.floor(s / 60) + "m ago";
  if (s < 86400) return Math.floor(s / 3600) + "h ago";
  return Math.floor(s / 86400) + "d ago";
}
async function refreshChats(){
  const el = $("chatsList"); el.innerHTML = "";
  let chats = [];
  try { chats = (await (await fetch("/api/chats")).json()).chats || []; } catch {}
  if (!chats.length) { el.innerHTML = `<div class="cfgempty">No saved conversations yet.</div>`; return; }
  for (const ch of chats) {
    const row = document.createElement("div"); row.className = "row" + (ch.id === currentConvId ? " active" : "");
    const lbl = document.createElement("div"); lbl.className = "lbl";
    lbl.innerHTML = `<div class="t">${escapeHtml(ch.title || "Untitled")}</div><div class="s">${ch.messages} msg · ${relTime(ch.updated)}</div>`;
    lbl.addEventListener("click", () => loadChat(ch.id));
    const del = document.createElement("button"); del.className = "x"; del.textContent = "🗑"; del.title = "Delete";
    del.addEventListener("click", (e) => { e.stopPropagation(); deleteChat(ch.id); });
    row.appendChild(lbl); row.appendChild(del); el.appendChild(row);
  }
}
async function loadChat(id){
  if (streaming) controller?.abort();
  try { const j = await (await fetch(`/api/chats/${id}`)).json(); history = j.messages || []; currentConvId = id; renderHistory(); }
  catch { sysMsg("⚠ couldn't load that conversation"); }
  closeChats();
}
async function deleteChat(id){
  try { await fetch(`/api/chats/${id}`, { method: "DELETE" }); } catch {}
  if (id === currentConvId) { history = []; currentConvId = null; $("thread").innerHTML = ""; setEmpty(true); }
  refreshChats();
}
$("chatsbtn").addEventListener("click", openChats);
$("chatsScrim").addEventListener("click", closeChats);
$("chatsNew").addEventListener("click", () => { if (streaming) controller?.abort(); history = []; currentConvId = null; $("thread").innerHTML = ""; setEmpty(true); closeChats(); $("input").focus(); });

async function refreshCfg(){
  try {
    const c = await (await fetch("/api/config")).json();
    $("cfgStatus").textContent = `${c.backend} · ${c.tools} tool(s)`;
    const pe = $("cfgProviders"); pe.innerHTML = "";
    (c.providers || []).forEach(p => {
      const b = document.createElement("button"); b.className = "pill" + (p === c.provider ? " on" : ""); b.textContent = p;
      b.addEventListener("click", async () => { await fetch(`/api/provider/${encodeURIComponent(p)}`, { method: "POST" }); loadConfig(); refreshStatus(); refreshCfg(); });
      pe.appendChild(b);
    });
  } catch {}
  try {
    const j = await (await fetch("/api/servers")).json();
    const el = $("cfgServers"); el.innerHTML = "";
    if (!(j.servers || []).length) el.innerHTML = `<div class="cfgempty">No MCP servers configured — add them in config.yaml.</div>`;
    (j.servers || []).forEach(s => {
      const row = document.createElement("div"); row.className = "row";
      row.innerHTML = `<div class="lbl"><div class="t">${escapeHtml(s.name)}</div><div class="s">${escapeHtml(s.command)} ${escapeHtml((s.args || []).join(" "))}</div></div>`;
      const sw = document.createElement("div"); sw.className = "sw" + (s.enabled ? " on" : ""); sw.title = s.enabled ? "Enabled — click to disable" : "Disabled — click to enable";
      sw.addEventListener("click", async () => {
        sw.style.opacity = ".5";
        await fetch(`/api/mcp/${encodeURIComponent(s.name)}/${s.enabled ? "disable" : "enable"}`, { method: "POST" });
        refreshStatus(); refreshCfg();
      });
      row.appendChild(sw); el.appendChild(row);
    });
  } catch {}
  try {
    const j = await (await fetch("/api/tools")).json();
    $("cfgToolCount").textContent = (j.tools || []).length ? `(${j.tools.length})` : "";
    const el = $("cfgTools"); el.innerHTML = "";
    if (!(j.tools || []).length) el.innerHTML = `<div class="cfgempty">Enable a server to load tools.</div>`;
    (j.tools || []).forEach(t => {
      const row = document.createElement("div"); row.className = "row";
      row.innerHTML = `<div class="lbl"><div class="t">${escapeHtml(t.name)}</div><div class="s">${escapeHtml((t.description || "").slice(0, 90))}</div></div>`;
      el.appendChild(row);
    });
  } catch {}
}

loadConfig(); refreshStatus(); setInterval(refreshStatus, 5000);
</script>
